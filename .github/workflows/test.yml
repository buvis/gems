name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group test --group dev

      - name: Audit dependencies
        run: uv run pip-audit

      - name: Lint & format check
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=80  # ratchet: bump after adding tests

      - name: Type check
        run: uv run mypy src/lib/ src/tools/

  # Single status check for branch protection / automerge
  test:
    if: always()
    needs: [test-matrix]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "Matrix jobs failed or were cancelled"
            exit 1
          fi
