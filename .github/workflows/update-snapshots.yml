name: Update snapshots

on:
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker to regenerate (default: snapshot)"
        required: false
        default: "snapshot"

permissions:
  contents: write
  pull-requests: write

env:
  BUVIS_SKIP_FRONTEND: "1"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras --group test --group dev

      - name: Regenerate snapshot baselines
        env:
          BUVIS_SNAPSHOT_CANONICAL: "1"
        run: uv run pytest -m "${{ inputs.marker }}" --snapshot-update

      - name: Verify snapshots now pass
        env:
          BUVIS_SNAPSHOT_CANONICAL: "1"
        run: uv run pytest -m "${{ inputs.marker }}"

      - name: Open pull request with updated baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain tests/)" ]; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="update-snapshots/${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add tests/
          git commit -m "test: regenerate snapshot baselines in canonical env"
          git push origin "$BRANCH"
          gh pr create \
            --title "test: regenerate snapshot baselines" \
            --body "Automated regeneration via update-snapshots workflow on the canonical env (Linux + Python 3.12)." \
            --base master \
            --head "$BRANCH"
