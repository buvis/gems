name: Publish to PyPI

on:
  push:
    tags:
      - "gems-v*"
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI"
        type: boolean
        default: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-wheels:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: uv pip install --system maturin tomli

      - name: Pin dependencies from lockfile
        run: python dev/bin/pin_deps.py .

      - name: Build wheel
        run: uv build --wheel

      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          uv pip install --system auditwheel patchelf
          auditwheel repair dist/*.whl --wheel-dir dist-repaired
          rm -rf dist
          mv dist-repaired dist

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: ${{ (contains(github.ref_name, 'rc') || inputs.testpypi) && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/*.whl

      - name: Publish
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          repository-url: ${{ (contains(github.ref_name, 'rc') || inputs.testpypi) && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  github-release:
    needs: [build-wheels, publish]
    if: github.event_name == 'push' && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: dist/buvis-gems.cdx.json

      - name: Extract changelog
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#gems-v}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          awk "/^## \[${version//./\\.}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > release-notes.md

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.VERSION }}
          body_path: release-notes.md
          files: |
            dist/*.whl
            dist/*.cdx.json
